<!DOCTYPE html>
<!-- Design Ref: paint-tui.plan.md §3.3 — TUI Image Editor 기반 재작성 -->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎨 그림판 — 보장 마크업</title>

<!-- Toss 프로젝트 공통 디자인 토큰 -->
<link rel="stylesheet" href="styles.css?v=toss1" />

<!-- TUI Image Editor -->
<link rel="stylesheet" href="https://uicdn.toast.com/tui-color-picker/latest/tui-color-picker.css" />
<link rel="stylesheet" href="https://uicdn.toast.com/tui-image-editor/latest/tui-image-editor.css" />

<!-- Paint 페이지 전용 (TUI 테마 오버라이드 + 상단 헤더) -->
<link rel="stylesheet" href="paint.css?v=tui1" />
</head>
<body>

<header class="paint-header">
  <a class="brand" href="index.html" aria-label="TossInsurance">
    <img src="Logo/TossInsurance/TossInsurance_Logo_Simple/TossInsurance_Logo_Simple_Primary/TossInsurance_Logo_Simple_Primary.png" alt="TossInsurance" />
  </a>
  <h1>그림판</h1>
  <span class="source-info" id="sourceInfo"></span>
  <div class="spacer"></div>
  <button class="btn" id="clipBtn" title="클립보드에 복사 (Ctrl+C)">📋 클립보드</button>
  <button class="btn" id="pdfBtn" title="PDF로 저장">📄 PDF</button>
  <button class="btn danger" id="closeBtn" title="닫기 (Esc)">✕</button>
</header>

<div id="tui-image-editor" aria-label="이미지 편집기"></div>

<div class="empty-state" id="emptyState" style="display:none">
  <p>캡처된 이미지가 없습니다.</p>
  <p>overview / index 페이지에서 🎨 그림판 버튼으로 시작하세요.</p>
</div>

<div class="toast" id="toast"></div>

<!-- Fabric v4 (TUI Image Editor 요구) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.2.0/fabric.min.js"></script>
<script src="https://uicdn.toast.com/tui.code-snippet/v1.5.0/tui-code-snippet.min.js"></script>
<script src="https://uicdn.toast.com/tui-color-picker/latest/tui-color-picker.js"></script>
<script src="https://uicdn.toast.com/tui-image-editor/latest/tui-image-editor.js"></script>

<!-- PDF 내보내기 -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script src="paint.js?v=tui1"></script>
</body>
</html>
