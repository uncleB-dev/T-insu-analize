<!DOCTYPE html>
<!-- Design Ref: paint-minimal.plan.md §3 — Konva.js 기반 미니멀 그림판 -->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎨 그림판 — 보장 마크업</title>

<!-- Toss 프로젝트 공통 디자인 토큰 -->
<link rel="stylesheet" href="styles.css?v=toss1" />
<link rel="stylesheet" href="paint.css?v=mini5" />
</head>
<body>

<header class="paint-header">
  <!-- ===== Zone 1: Left (logo + title) — 항상 표시 ===== -->
  <div class="zone-left">
    <a class="brand" href="index.html" aria-label="TossInsurance">
      <img src="Logo/TossInsurance/TossInsurance_Logo_Simple/TossInsurance_Logo_Simple_Primary/TossInsurance_Logo_Simple_Primary.png" alt="TossInsurance" />
    </a>
    <h1>그림판</h1>
    <span class="source-info" id="sourceInfo"></span>
  </div>

  <!-- ===== Zone 2: Center (도구) — 좁아지면 가로 스크롤 ===== -->
  <button class="scroll-arrow left" id="scrollLeftBtn" aria-label="왼쪽 스크롤" tabindex="-1">‹</button>
  <div class="zone-center" id="scrollZone">
    <div class="tg history">
      <button class="tb" data-act="undo" title="되돌리기 (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
      </button>
      <button class="tb" data-act="redo" title="다시하기 (Ctrl+Y)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
      </button>
    </div>

    <div class="tg destructive">
      <button class="tb" data-act="delete" title="선택 삭제 (Del)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
      <button class="tb" data-act="clear" title="모두 지우기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </div>

    <div class="tg tools">
      <button class="tb" data-tool="select" title="선택 (V)" data-active>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7 19 2-8 8-2-17-9z"/></svg>
      </button>
      <button class="tb" data-tool="line" title="직선 (L)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      </button>
      <button class="tb" data-tool="rect" title="사각형 (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
      </button>
      <button class="tb" data-tool="highlight" title="형광펜 (H)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h3l6-6"/><path d="M22 12l-5-5L9 15l5 5z"/><line x1="14" y1="6" x2="18" y2="10"/></svg>
      </button>
    </div>

    <div class="tg palette" id="palette" aria-label="색상 팔레트">
      <!-- 9 swatches injected by JS -->
    </div>

    <!-- 향후 PNG 스탬프 추가 시 .tg.stamps 영역 신설 예정 -->
    <div class="tg emojis" aria-label="이모지">
      <button class="emoji-btn" data-emoji="✅" title="체크">✅</button>
      <button class="emoji-btn" data-emoji="❗" title="강조">❗</button>
      <button class="emoji-btn" data-emoji="⭐" title="별">⭐</button>
      <button class="emoji-btn" data-emoji="👉" title="가리키기">👉</button>
      <button class="emoji-btn" data-emoji="📌" title="핀">📌</button>
    </div>
  </div>
  <button class="scroll-arrow right" id="scrollRightBtn" aria-label="오른쪽 스크롤" tabindex="-1">›</button>

  <!-- ===== Zone 3: Right (export/close) — 항상 sticky 표시 ===== -->
  <div class="zone-right">
    <button class="tb wide" id="clipBtn" title="클립보드에 복사">
      <span class="ic">📋</span><span class="label-text">클립보드</span>
    </button>
    <button class="tb wide" id="pngBtn" title="PNG 다운로드 (Ctrl+S)">
      <span class="ic">💾</span><span class="label-text">PNG</span>
    </button>
    <button class="tb wide" id="pdfBtn" title="PDF 저장">
      <span class="ic">📄</span><span class="label-text">PDF</span>
    </button>
    <button class="tb danger" id="closeBtn" title="닫기 (Esc)">✕</button>
  </div>
</header>

<!-- Konva Stage 영역 -->
<main class="stage-wrap" id="stageWrap">
  <div id="stage"></div>
</main>

<div class="empty-state" id="emptyState" style="display:none">
  <p>캡처된 이미지가 없습니다.</p>
  <p>overview / index 페이지에서 🎨 그림판 버튼으로 시작하세요.</p>
</div>

<div class="toast" id="toast"></div>

<!-- Konva (152KB) - 단일 의존성 -->
<script src="https://cdn.jsdelivr.net/npm/konva@9.3.6/konva.min.js"></script>
<!-- jsPDF - PDF 저장용 (S3에서 사용) -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script src="paint.js?v=mini5"></script>
</body>
</html>
