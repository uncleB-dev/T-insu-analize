<!DOCTYPE html>
<!-- Design Ref: paint-tui.plan.md §3.3 — TUI Image Editor 기반 재작성 -->
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎨 그림판 — 보장 마크업</title>

<!-- Toss 프로젝트 공통 디자인 토큰 -->
<link rel="stylesheet" href="styles.css?v=toss1" />

<!-- TUI Image Editor (버전 고정 — 드리프트 방지) -->
<link rel="stylesheet" href="https://uicdn.toast.com/tui-color-picker/v2.2.8/tui-color-picker.css" />
<link rel="stylesheet" href="https://uicdn.toast.com/tui-image-editor/v3.15.2/tui-image-editor.css" />

<!-- Paint 페이지 전용 (TUI 테마 오버라이드 + 상단 헤더) -->
<link rel="stylesheet" href="paint.css?v=tui3" />
</head>
<body>

<header class="paint-header">
  <a class="brand" href="index.html" aria-label="TossInsurance">
    <img src="Logo/TossInsurance/TossInsurance_Logo_Simple/TossInsurance_Logo_Simple_Primary/TossInsurance_Logo_Simple_Primary.png" alt="TossInsurance" />
  </a>
  <h1>그림판</h1>
  <span class="source-info" id="sourceInfo"></span>

  <div class="tool-group">
    <button class="btn tool-btn" id="hiBtn" title="형광펜 — 노랑 반투명 (H)">🖍 형광펜</button>
  </div>

  <div class="tool-group emoji-group" aria-label="이모지 스티커">
    <button class="btn emoji-btn" data-emoji="✅" title="체크">✅</button>
    <button class="btn emoji-btn" data-emoji="❗" title="강조">❗</button>
    <button class="btn emoji-btn" data-emoji="⭐" title="별">⭐</button>
    <button class="btn emoji-btn" data-emoji="❤" title="하트">❤</button>
    <button class="btn emoji-btn" data-emoji="🔥" title="핫">🔥</button>
    <button class="btn emoji-btn" data-emoji="👉" title="오른손">👉</button>
    <button class="btn emoji-btn" data-emoji="👈" title="왼손">👈</button>
    <button class="btn emoji-btn" data-emoji="💡" title="아이디어">💡</button>
    <button class="btn emoji-btn" data-emoji="📌" title="핀">📌</button>
    <button class="btn emoji-btn" data-emoji="❌" title="엑스">❌</button>
  </div>

  <div class="spacer"></div>
  <button class="btn" id="clipBtn" title="클립보드에 복사">📋 클립보드</button>
  <button class="btn" id="pdfBtn" title="PDF로 저장">📄 PDF</button>
  <button class="btn danger" id="closeBtn" title="닫기 (Esc)">✕</button>
</header>

<div id="tui-image-editor" aria-label="이미지 편집기"></div>

<div class="empty-state" id="emptyState" style="display:none">
  <p>캡처된 이미지가 없습니다.</p>
  <p>overview / index 페이지에서 🎨 그림판 버튼으로 시작하세요.</p>
</div>

<div class="toast" id="toast"></div>

<!-- Fabric v4 (TUI Image Editor 요구) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/4.2.0/fabric.min.js"></script>
<script src="https://uicdn.toast.com/tui.code-snippet/v1.5.2/tui-code-snippet.min.js"></script>
<script src="https://uicdn.toast.com/tui-color-picker/v2.2.8/tui-color-picker.js"></script>
<script src="https://uicdn.toast.com/tui-image-editor/v3.15.2/tui-image-editor.js"></script>

<!-- PDF 내보내기 -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script src="paint.js?v=tui3"></script>
</body>
</html>
